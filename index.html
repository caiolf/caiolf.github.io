<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Caio Ferraresi</title>
		<link rel="stylesheet" href="./css/style.css" />
		<link
			rel="shortcut icon"
			type="imagex/svg"
			href="./img/robo-head.svg"
		/>
	</head>
	<body>
		<header class="cabeca">
			<img class="cabeca-img" src="./img/robo-head.svg" />
			<nav class="cabeca-menu">
				<a class="cabeca-menu-item" href="#">Jogos</a>
				<a class="cabeca-menu-item" href="#">Currículo</a>
				<a class="cabeca-menu-item" href="#">Redes Sociais</a>
				<a class="cabeca-menu-item" href="#">Contato</a>
			</nav>
		</header>

		<main class="conteudo">
			<section class="conteudo-principal">
				<div class="conteudo-principal-escrito">
					<h1 class="conteudo-principal-escrito-titulo">
						Caio Ferraresi
					</h1>
					<h2 class="conteudo-principal-escrito-subtitulo">
						Desenvolvedor Web
					</h2>
					<button class="conteudo-principal-escrito-botao">
						Me adicione
					</button>
				</div>
				<img
					class="conteudo-principal-img"
					src="./img/robo.svg"
					alt="Imagem do robozinho"
				/>
			</section>
			<section class="conteudo-secundario">
				<h3 class="conteudo-secundario-titulo">Jogos favoritos</h3>
				<div class="jogos">
					<img src="./img/lostark.svg" alt="" class="jogos-img" />
					<img src="./img/dota2.svg" alt="" class="jogos-img" />
					<img src="./img/lol.svg" alt="" class="jogos-img" />
					<img src="./img/terraria.svg" alt="" class="jogos-img" />
					<img src="./img/minecraft.svg" alt="" class="jogos-img" />
				</div>
			</section>
		</main>

		<footer class="rodape">
			<img class="rodape-img" src="./img/emconstrucao.svg" alt="" />
		</footer>
	</body>
</html>
